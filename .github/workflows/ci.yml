name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  cli-check:
    name: nself CLI Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install nself CLI
        run: |
          curl -fsSL https://install.nself.org | bash
          echo "$HOME/.nself/bin" >> $GITHUB_PATH

      - name: Verify nself CLI
        run: |
          nself version
          nself help

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: TypeScript check
        run: pnpm run typecheck

  test:
    name: Test Suite
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test:run

      - name: Generate coverage
        run: pnpm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build
        env:
          NEXT_PUBLIC_BACKEND_PROVIDER: nself
          NEXT_PUBLIC_ENVIRONMENT: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: frontend/.next/
          retention-days: 7

  build-matrix:
    name: Build (${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        backend: [nself, supabase, nhost]

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with ${{ matrix.backend }}
        run: pnpm run build
        env:
          NEXT_PUBLIC_BACKEND_PROVIDER: ${{ matrix.backend }}
          NEXT_PUBLIC_ENVIRONMENT: production

  capacitor-android:
    name: Capacitor Android Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build Next.js (static export for Capacitor)
        working-directory: ./frontend
        run: pnpm run build
        env:
          NEXT_PUBLIC_BACKEND_PROVIDER: nself
          NEXT_PUBLIC_ENVIRONMENT: production

      - name: Capacitor sync
        working-directory: ./frontend
        run: pnpm exec cap sync android

      - name: Build Android (debug, compile verify only)
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug --no-daemon

  capacitor-ios:
    name: Capacitor iOS Build
    runs-on: macos-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build Next.js (static export for Capacitor)
        working-directory: ./frontend
        run: pnpm run build
        env:
          NEXT_PUBLIC_BACKEND_PROVIDER: nself
          NEXT_PUBLIC_ENVIRONMENT: production

      - name: Capacitor sync
        working-directory: ./frontend
        run: pnpm exec cap sync ios

      - name: Build iOS (simulator, compile verify only)
        working-directory: ./frontend/ios/App
        run: |
          xcodebuild \
            -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty || exit ${PIPESTATUS[0]}
