name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  cli-check:
    name: nself CLI Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install nself CLI
        run: |
          curl -fsSL https://install.nself.org | bash
          echo "$HOME/.nself/bin" >> $GITHUB_PATH

      - name: Verify nself CLI
        run: |
          nself version
          nself help

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: TypeScript check
        run: pnpm run typecheck

  test:
    name: Test Suite
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test:run

      - name: Generate coverage
        run: pnpm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build
        env:
          NEXT_PUBLIC_BACKEND_PROVIDER: nself
          NEXT_PUBLIC_ENVIRONMENT: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: frontend/.next/
          retention-days: 7

  build-matrix:
    name: Build (${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        backend: [nself, supabase, nhost]

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with ${{ matrix.backend }}
        run: pnpm run build
        env:
          NEXT_PUBLIC_BACKEND_PROVIDER: ${{ matrix.backend }}
          NEXT_PUBLIC_ENVIRONMENT: production

  capacitor-android:
    name: Capacitor Android Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Android SDK 36
        # Capacitor 8.x targets compileSdkVersion 36 — install it if missing.
        run: |
          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          # Find sdkmanager in cmdline-tools (latest or highest version)
          SDKMANAGER=""
          if [ -f "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$SDK_DIR/cmdline-tools/latest/bin/sdkmanager"
          else
            SDKMANAGER=$(find "$SDK_DIR/cmdline-tools" -name sdkmanager -type f 2>/dev/null | sort -V | tail -1 || true)
          fi
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found, skipping SDK 36 install (will use pre-installed SDK)"
            exit 0
          fi
          if [ ! -d "$SDK_DIR/platforms/android-36" ]; then
            echo "Installing Android SDK 36..."
            yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
            "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" 2>&1 | tail -5
          else
            echo "Android SDK 36 already available"
          fi

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build Next.js (static export for Capacitor)
        working-directory: ./frontend
        run: pnpm run build
        env:
          NEXT_PUBLIC_BACKEND_PROVIDER: nself
          NEXT_PUBLIC_ENVIRONMENT: production
          CAPACITOR_BUILD: "true"

      - name: Set Android SDK path
        run: echo "sdk.dir=${ANDROID_SDK_ROOT:-$ANDROID_HOME}" > frontend/android/local.properties

      - name: Capacitor sync
        working-directory: ./frontend
        run: pnpm exec cap sync android

      - name: Build Android (debug, compile verify only)
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug --no-daemon

  capacitor-ios:
    name: Capacitor iOS Build
    runs-on: macos-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build Next.js (static export for Capacitor)
        working-directory: ./frontend
        run: pnpm run build
        env:
          NEXT_PUBLIC_BACKEND_PROVIDER: nself
          NEXT_PUBLIC_ENVIRONMENT: production
          CAPACITOR_BUILD: "true"

      - name: Capacitor sync
        working-directory: ./frontend
        run: pnpm exec cap sync ios

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-

      - name: Build iOS (simulator, compile verify only)
        working-directory: ./frontend/ios/App
        run: |
          xcodebuild \
            -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty || exit ${PIPESTATUS[0]}

  typecheck-desktop:
    name: Typecheck desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install
      - name: Typecheck
        working-directory: frontend
        run: pnpm typecheck
