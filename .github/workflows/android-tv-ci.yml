name: Android TV CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/src/app/tv/**'
      - 'frontend/android/**'
      - '.github/workflows/android-tv-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/src/app/tv/**'

jobs:
  tv-build:
    name: Android TV Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build Next.js (TV optimized)
        working-directory: frontend
        env:
          NEXT_PUBLIC_BACKEND_PROVIDER: nself
          CAPACITOR_BUILD: 'true'
        run: pnpm build

      - name: Capacitor sync Android
        working-directory: frontend
        run: pnpm exec cap sync android

      - name: Build Android debug APK (TV)
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android TV emulator tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          profile: tv_1080p
          target: google_apis
          arch: x86_64
          script: |
            adb install frontend/android/app/build/outputs/apk/debug/app-debug.apk
            adb shell pm list packages | grep org.nself.tasks
            adb shell cmd package resolve-activity --brief -c android.intent.category.LEANBACK_LAUNCHER org.nself.tasks
            echo "Android TV CI: APK installs and responds to leanback launcher"

      - name: Upload TV APK
        uses: actions/upload-artifact@v4
        with:
          name: ntasks-android-tv-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
