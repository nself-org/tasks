name: Flutter CI

on:
  push:
    branches: [main]
    paths: ['app/**']
  pull_request:
    branches: [main]
    paths: ['app/**']

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter analyze
      - run: flutter test

  build-android:
    # TODO: Enable when platform dirs are scaffolded (flutter create --platforms=...)
    if: false
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build apk --debug
      - run: flutter build appbundle --debug

  build-ios:
    # TODO: Enable when platform dirs are scaffolded (flutter create --platforms=...)
    if: false
    name: Build iOS
    runs-on: macos-15
    needs: analyze
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build ios --debug --no-codesign

  build-macos:
    # TODO: Enable when platform dirs are scaffolded (flutter create --platforms=...)
    if: false
    name: Build macOS
    runs-on: macos-15
    needs: analyze
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build macos --debug

  build-linux:
    # TODO: Enable when platform dirs are scaffolded (flutter create --platforms=...)
    if: false
    name: Build Linux
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'
          cache: true
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev liblzma-dev libglu1-mesa
      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Build Linux release
        run: flutter build linux --release
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-release
          path: app/build/linux/x64/release/bundle/

  build-windows:
    # TODO: Enable when platform dirs are scaffolded (flutter create --platforms=...)
    if: false
    name: Build Windows (MSIX)
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
        working-directory: app
      - name: Generate l10n
        run: flutter gen-l10n
        working-directory: app
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      - name: Build Windows release
        run: flutter build windows --release
        working-directory: app
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-release
          path: app/build/windows/x64/runner/Release/
