name: Desktop CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/desktop-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    name: Build desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-x86
            os: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows
            os: windows-latest
            args: ''
          - platform: linux
            os: ubuntu-22.04
            args: ''

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'aarch64-apple-darwin' || matrix.platform == 'macos-x86' && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/platforms/desktop/tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install

      - name: Build Next.js frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_BACKEND_PROVIDER: nself
        run: pnpm build

      - name: Build Tauri desktop app
        working-directory: frontend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm desktop:build -- ${{ matrix.args }}

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos' || matrix.platform == 'macos-x86'
        uses: actions/upload-artifact@v4
        with:
          name: ntasks-${{ matrix.platform }}
          path: |
            frontend/platforms/desktop/tauri/target/**/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ntasks-windows
          path: |
            frontend/platforms/desktop/tauri/target/release/bundle/msi/*.msi
            frontend/platforms/desktop/tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ntasks-linux
          path: |
            frontend/platforms/desktop/tauri/target/release/bundle/deb/*.deb
            frontend/platforms/desktop/tauri/target/release/bundle/appimage/*.AppImage
            frontend/platforms/desktop/tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn
