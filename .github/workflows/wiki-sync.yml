name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - '.github/wiki/**'
  workflow_dispatch:

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync to Wiki
        # continue-on-error: the wiki git repo is created by GitHub only after
        # the first page is saved via the web UI at /wiki. Until then pushes to
        # <repo>.wiki.git fail with "repository not found". Once the wiki is
        # initialized (visit https://github.com/nself-org/ntask/wiki and save),
        # remove this flag — the wiki will then stay in sync automatically.
        continue-on-error: true
        uses: Andrew-Chen-Wang/github-wiki-action@v5
        with:
          path: .github/wiki/
          strategy: init
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_MAIL: ${{ github.actor }}@users.noreply.github.com
          GH_NAME: ${{ github.actor }}
