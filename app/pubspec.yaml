name: ntasks
description: "ɳTasks — self-hosted task management app powered by nSelf"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  http: ^1.3.0
  flutter_secure_storage: ^9.2.4
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.5
  path: ^1.9.1
  url_launcher: ^6.3.1
  flutter_local_notifications: ^17.2.2
  intl: ^0.20.0
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # riverpod_generator and hive_generator conflict on analyzer versions with current SDK.
  # Generated files (.g.dart) are committed. Re-run generators only when upgrading deps.
  # riverpod_generator: ^2.6.3
  # hive_generator: ^2.0.1
  build_runner: ^2.4.14
  custom_lint: ^0.7.1
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
